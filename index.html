<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מודל כדאיות למשקיע LP — פרויקט מלון ומגורים, ירושלים</title>
<style>
  :root{
    --bg:#faf8f5; --card:#ffffff; --ink:#2b2320; --muted:#7a6f6a; --line:#e6ddd6;
    --oxblood:#5e2c23; --oxblood2:#4a221b; --azure:#adc4da; --azure2:#7f9db8;
    --accent:#5e2c23; --accent2:#7f9db8; --pos:#7f9db8; --neg:#5e2c23; --chip:#f2ece6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink);
    font-family:Georgia,"Times New Roman","David",serif;
    padding:0 22px 22px; max-width:1320px; margin:0 auto;}
  .brandbar{background:var(--oxblood); margin:0 -22px 22px; padding:24px 34px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;}
  .brand-logo{display:block; text-decoration:none;}
  .brand-logo .wm{font-family:Georgia,"Times New Roman",serif; color:var(--azure);
    font-size:28px; letter-spacing:10px; font-weight:400; line-height:1;}
  .brand-logo .wm-sub{font-size:9px; letter-spacing:5px; color:var(--azure); opacity:.85; margin-top:6px; text-align:center;}
  header{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px; margin-bottom:18px;}
  h1{font-size:26px; font-weight:400; color:var(--oxblood); font-family:Georgia,"Times New Roman",serif; letter-spacing:.5px;}
  h1 small{display:block; font-size:13px; color:var(--muted); font-weight:400; margin-top:4px;}
  .hdr-side{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .badge{background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:6px 14px; border-radius:0; font-size:11.5px; letter-spacing:.3px;}
  .langsw{display:flex; border:1px solid rgba(173,196,218,.5); border-radius:0; overflow:hidden; background:transparent;}
  .langsw button{border:none; background:none; padding:6px 16px; font-size:12px; cursor:pointer;
    color:var(--azure); font-family:inherit; letter-spacing:1px;}
  .langsw button.on{background:var(--azure); color:var(--oxblood);}
  .grid{display:grid; grid-template-columns:360px 1fr; gap:18px;}
  @media(max-width:940px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--card); border:1px solid var(--line); border-radius:2px; padding:18px;
    box-shadow:none;}
  .card h2{font-size:15.5px; font-weight:400; color:var(--oxblood); margin-bottom:12px; letter-spacing:.8px;
    display:flex; align-items:center; gap:10px; font-family:Georgia,"Times New Roman",serif;}
  .card h2::after{content:""; flex:1; height:1px; background:var(--line);}
  .ctl{margin-bottom:13px;}
  .ctl .lab{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; gap:8px;}
  .ctl .lab span{font-size:12.5px; font-weight:600;}
  .ctl .lab .val{font-size:12.5px; color:var(--oxblood); font-weight:700; direction:ltr; white-space:nowrap; font-variant-numeric:tabular-nums;}
  .ctl .sub{font-size:10.5px; color:var(--muted); margin-top:2px;}
  input[type=range]{width:100%; accent-color:var(--oxblood); cursor:pointer; height:22px;}
  .ctl.changed .lab span:first-child::after{content:" •"; color:var(--azure2);}
  details{margin-bottom:8px; border:1px solid var(--line); border-radius:2px; padding:8px 12px;}
  details[open]{padding-bottom:4px;}
  summary{cursor:pointer; font-size:13px; font-weight:700; color:var(--oxblood); padding:4px 0; user-select:none;}
  summary .mini{font-weight:400; color:var(--muted); font-size:11px; margin-inline-start:6px;}
  .chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .chip{background:var(--chip); border:1px solid var(--line); border-radius:16px;
    padding:5px 12px; font-size:12px; cursor:pointer; user-select:none;}
  .chip:hover{border-color:var(--oxblood);}
  .chip.active{background:var(--oxblood); color:#fff; border-color:var(--oxblood);}
  .reset{width:100%; margin-top:6px; background:none; border:1px solid var(--line); border-radius:2px;
    padding:8px; font-size:13px; color:var(--muted); cursor:pointer; font-family:inherit;}
  .reset:hover{border-color:var(--oxblood); color:var(--oxblood);}
  .heroes{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px;}
  @media(max-width:700px){.heroes{grid-template-columns:repeat(2,1fr);}}
  .hero{background:var(--oxblood); color:#fff; border-radius:2px; padding:18px 18px 14px;}
  .hero .t{font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--azure); margin-bottom:9px; opacity:1;}
  .hero .v{font-size:29px; font-weight:400; direction:ltr; text-align:center; letter-spacing:0; font-family:Georgia,"Times New Roman",serif; font-variant-numeric:tabular-nums;}
  .hero .d{font-size:11px; margin-top:7px; direction:ltr; text-align:center;}
  .hero .d.pos{color:#bcd4a8;} .hero .d.neg{color:#e8b3a2;} .hero .d.zero{color:var(--azure); opacity:.75;}
  .secrow{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px;}
  @media(max-width:700px){.secrow{grid-template-columns:repeat(2,1fr);}}
  .sec{background:var(--card); border:1px solid var(--line); border-radius:2px; padding:12px 16px;}
  .sec .t{font-size:11.5px; color:var(--muted); margin-bottom:4px;}
  .sec .v{font-size:15px; font-weight:700; direction:ltr; text-align:right; color:var(--oxblood); font-family:Georgia,serif; font-variant-numeric:tabular-nums;}
  .charts{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px;}
  @media(max-width:940px){.charts{grid-template-columns:1fr;}}
  svg text{font-family:inherit;}
  .scen-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:12px;}
  @media(max-width:980px){.scen-grid{grid-template-columns:repeat(2,1fr);}}
  .scen{border:1px solid var(--line); border-radius:2px; overflow:hidden; background:#fdfcfa;
    display:flex; flex-direction:column;}
  .scen .head{padding:9px 12px 8px; color:#fff; font-size:13px; font-weight:700;}
  .scen .head small{display:block; font-weight:400; font-size:10px; opacity:.85; margin-top:2px; line-height:1.45;}
  .scen .body{padding:12px; display:flex; flex-direction:column; gap:9px; flex:1;}
  .scen .irr{font-size:25px; font-weight:800; direction:ltr; text-align:right; letter-spacing:-.5px; line-height:1;}
  .scen .irr small{font-size:10.5px; font-weight:400; color:var(--muted); display:block; margin-top:3px; letter-spacing:0;}
  .scen .m{font-size:12px; color:var(--muted); display:flex; justify-content:space-between; gap:6px;
    border-top:1px dashed var(--line); padding-top:7px;}
  .scen .m b{color:var(--ink); direction:ltr; white-space:nowrap;}
  .scen.you{outline:2px solid var(--azure2); background:#f7fafc;}
  .scen-note{font-size:11px; color:var(--muted); margin-top:10px;}
  table.taxtbl{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.taxtbl th{background:var(--chip); font-weight:600; text-align:start;}
  table.taxtbl th,table.taxtbl td{border:1px solid var(--line); padding:7px 10px;}
  table.taxtbl td.n{direction:ltr; text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; width:90px;}
  table.taxtbl td:last-child{color:var(--muted); font-size:11px;}
  table.taxtbl tr.tot td{font-weight:700; background:var(--chip);}
  table.taxtbl tr.tot td:last-child{font-weight:400;}
  .foot{font-size:11.5px; color:var(--muted); line-height:1.7; margin-top:16px;}
  .foot b{color:var(--ink);}
  .terms{font-size:12px; line-height:1.5; padding-bottom:6px;}
  .terms .trow{display:flex; justify-content:space-between; gap:10px; padding:4px 0; border-bottom:1px dashed var(--line);}
  .terms .trow:last-child{border-bottom:none;}
  .terms .trow span:first-child{color:var(--muted);}
  .terms .trow span:last-child{font-weight:600; white-space:nowrap;}
.su-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .su-panel{border:1px solid var(--line); border-radius:2px; padding:10px 16px 12px; background:#fdfcfa;}
  .su-panel.you{outline:2px solid var(--azure2); background:#f7fafc;}
  .su-t{font-weight:700; font-size:13.5px; color:var(--oxblood); letter-spacing:.5px; padding-bottom:6px; border-bottom:1px solid var(--line); margin-bottom:4px;}
  @media(max-width:700px){.su-grid{grid-template-columns:1fr;}}
  .su-h{font-size:11px; color:var(--muted); letter-spacing:1px; font-weight:700; margin:4px 0 2px;}
  .su-grid .trow{display:flex; justify-content:space-between; gap:10px; padding:5px 0; border-bottom:1px dashed var(--line); font-size:12.5px;}
  .su-grid .trow span:last-child{font-weight:600; direction:ltr; font-variant-numeric:tabular-nums;}
  .su-grid .trow.tot{border-bottom:none; font-weight:700; color:var(--oxblood);}
  @media print{.langsw,.reset,.chips{display:none} body{max-width:none; padding:0 10px 10px} .card,.hero,.scen,.charts>div{break-inside:avoid} details{border:none; padding:0} details>*{display:block}}
</style>
</head>
<body>
<div class="brandbar">
  <a class="brand-logo" href="https://www.omnamgroup.com" target="_blank" rel="noopener">
    <div class="wm">OMNAM</div>
    <div class="wm-sub">INVESTMENT&nbsp;GROUP</div>
  </a>
  <div class="langsw"><button id="lang-he" class="on">עברית</button><button id="lang-en">English</button></div>
</div>
<header>
  <h1 data-t="h1"></h1>
  <div class="hdr-side">
    <div class="badge" data-t="badge"></div>
  </div>
</header>

<div class="grid">
  <div>
    <div class="card">
      <h2 data-t="quick"></h2>
      <div class="chips" id="chips">
        <div class="chip active" data-s="base" data-t="chipBase"></div>
        <div class="chip" data-s="up" data-t="chipUp"></div>
        <div class="chip" data-s="dw1" data-t="chipDw1"></div>
        <div class="chip" data-s="dw2" data-t="chipDw2"></div>
      </div>

      <details open>
        <summary data-t="gHotel"></summary>
        <div class="ctl" id="c-adr">
          <div class="lab"><span data-t="lAdr"></span><span class="val" id="v-adr"></span></div>
          <input type="range" id="i-adr" min="3000" max="6000" step="1" value="4736">
          <div class="sub" data-t="sAdr"></div>
        </div>
        <div class="ctl" id="c-occ">
          <div class="lab"><span data-t="lOcc"></span><span class="val" id="v-occ"></span></div>
          <input type="range" id="i-occ" min="0.45" max="0.80" step="0.01" value="0.70">
          <div class="sub" data-t="sOcc"></div>
        </div>
        <div class="ctl" id="c-margin">
          <div class="lab"><span data-t="lMargin"></span><span class="val" id="v-margin"></span></div>
          <input type="range" id="i-margin" min="14" max="26" step="0.1" value="20.2">
          <div class="sub" data-t="sMargin"></div>
        </div>
        <div class="ctl" id="c-cap">
          <div class="lab"><span data-t="lCap"></span><span class="val" id="v-cap"></span></div>
          <input type="range" id="i-cap" min="0.05" max="0.10" step="0.0025" value="0.065">
          <div class="sub" data-t="sCap"></div>
        </div>
        <div class="ctl" id="c-hold">
          <div class="lab"><span data-t="lHold"></span><span class="val" id="v-hold"></span></div>
          <input type="range" id="i-hold" min="-24" max="48" step="6" value="0">
          <div class="sub" data-t="sHold"></div>
        </div>
      </details>

      <details open>
        <summary data-t="gResi"></summary>
        <div class="ctl" id="c-price">
          <div class="lab"><span data-t="lPrice"></span><span class="val" id="v-price"></span></div>
          <input type="range" id="i-price" min="90000" max="270000" step="1500" value="180180">
          <div class="sub" data-t="sPrice"></div>
        </div>
        <div class="ctl" id="c-area">
          <div class="lab"><span data-t="lArea"></span><span class="val" id="v-area"></span></div>
          <input type="range" id="i-area" min="5000" max="9000" step="100" value="7230">
          <div class="sub" data-t="sArea"></div>
        </div>
        <div class="ctl" id="c-vel">
          <div class="lab"><span data-t="lVel"></span><span class="val" id="v-vel"></span></div>
          <input type="range" id="i-vel" min="0.3" max="1.6" step="0.05" value="1">
          <div class="sub" data-t="sVel"></div>
        </div>
      </details>

      <details>
        <summary data-t="gFin"></summary>
        <div class="ctl" id="c-rate">
          <div class="lab"><span data-t="lRate"></span><span class="val" id="v-rate"></span></div>
          <input type="range" id="i-rate" min="0.05" max="0.12" step="0.0025" value="0.0605">
          <div class="sub" data-t="sRate"></div>
        </div>
        <div class="ctl" id="c-ltv">
          <div class="lab"><span data-t="lLtv"></span><span class="val" id="v-ltv"></span></div>
          <input type="range" id="i-ltv" min="0.50" max="0.80" step="0.025" value="0.70">
          <div class="sub" data-t="sLtv"></div>
        </div>
        <div class="ctl" id="c-capex">
          <div class="lab"><span data-t="lCapex"></span><span class="val" id="v-capex"></span></div>
          <input type="range" id="i-capex" min="0" max="0.25" step="0.01" value="0">
          <div class="sub" data-t="sCapex"></div>
        </div>
      </details>

      <details>
        <summary data-t="gTime"></summary>
        <div class="ctl" id="c-kz">
          <div class="lab"><span data-t="lKz"></span><span class="val" id="v-kz"></span></div>
          <input type="range" id="i-kz" min="0" max="24" step="1" value="0">
          <div class="sub" data-t="sKz"></div>
        </div>
        <div class="ctl" id="c-kcr">
          <div class="lab"><span data-t="lKcr"></span><span class="val" id="v-kcr"></span></div>
          <input type="range" id="i-kcr" min="0" max="24" step="1" value="0">
          <div class="sub" data-t="sKcr"></div>
        </div>
        <div class="ctl" id="c-kch">
          <div class="lab"><span data-t="lKch"></span><span class="val" id="v-kch"></span></div>
          <input type="range" id="i-kch" min="0" max="24" step="1" value="0">
          <div class="sub" data-t="sKch"></div>
        </div>
      </details>

      <details>
        <summary data-t="gTerms"></summary>
        <div class="terms" id="terms"></div>
      </details>

      <button class="reset" id="reset" data-t="reset"></button>
    </div>
  </div>

  <div>
    <div class="heroes">
      <div class="hero"><div class="t" data-t="hIrr"></div><div class="v" id="o-irr">—</div><div class="d" id="d-irr"></div></div>
      <div class="hero"><div class="t" data-t="hEm"></div><div class="v" id="o-em">—</div><div class="d" id="d-em"></div></div>
      <div class="hero"><div class="t" data-t="hProfit"></div><div class="v" id="o-profit">—</div><div class="d" id="d-profit"></div></div>
      <div class="hero"><div class="t" data-t="hPe"></div><div class="v" id="o-pe">—</div><div class="d" id="d-pe"></div></div>
    </div>
    <div class="secrow">
      <div class="sec"><div class="t" data-t="secPayback"></div><div class="v" id="o-payback">—</div></div>
      <div class="sec"><div class="t" data-t="secDist"></div><div class="v" id="o-dist">—</div></div>
      <div class="sec"><div class="t" data-t="secExit"></div><div class="v" id="o-exit">—</div></div>
    </div>

    <div class="card" style="margin-bottom:18px;">
      <h2 data-t="tlTitle"></h2>
      <svg id="ch-tl" viewBox="0 0 1120 104" width="100%"></svg>
    </div>

    <div class="charts">
      <div class="card">
        <h2 data-t="chCf"></h2>
        <svg id="ch-cf" width="100%" height="240" viewBox="0 0 560 240" preserveAspectRatio="none"></svg>
      </div>
      <div class="card">
        <h2 data-t="chCum"></h2>
        <svg id="ch-cum" width="100%" height="240" viewBox="0 0 560 240" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px;">
      <h2 data-t="taxTitle"></h2>
      <table class="taxtbl">
        <tr><th data-t="taxH1"></th><th data-t="taxH2"></th><th data-t="taxH3"></th><th data-t="taxH4"></th></tr>
        <tr><td data-t="taxBet"></td><td class="n">47.9</td><td class="n" id="tx-bet">—</td><td data-t="taxBetN"></td></tr>
        <tr><td data-t="taxResi"></td><td class="n">183.0</td><td class="n" id="tx-resi">—</td><td data-t="taxResiN"></td></tr>
        <tr><td data-t="taxHot"></td><td class="n">15.3</td><td class="n" id="tx-hotel">—</td><td data-t="taxHotN"></td></tr>
        <tr class="tot"><td data-t="taxTot"></td><td class="n">246.3</td><td class="n" id="tx-tot">—</td><td id="tx-note">—</td></tr>
      </table>
      <div class="sub" style="margin-top:8px; margin-bottom:0;" data-t="taxScope"></div>
    </div>

    <div class="card">
      <h2 data-t="scenTitle"></h2>
      <div class="scen-grid" id="scen-grid"></div>
      <div class="scen-note" data-t="scenNote"></div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h2 data-t="suTitle"></h2>
      <div class="su-grid">
        <div class="su-panel">
          <div class="su-t" data-t="suBaseH"></div>
          <div class="su-h" data-t="suUsesH"></div>
          <div class="trow"><span data-t="suAcq"></span><span>62.1</span></div>
          <div class="trow"><span data-t="suDev"></span><span>486.6</span></div>
          <div class="trow"><span data-t="suBet"></span><span>47.9</span></div>
          <div class="trow"><span data-t="suFin"></span><span>159.9</span></div>
          <div class="trow tot"><span data-t="suUsesT"></span><span>756.5</span></div>
          <div class="su-h" data-t="suSrcH"></div>
          <div class="trow"><span data-t="suResi"></span><span>1,116.6</span></div>
          <div class="trow"><span data-t="suHotel"></span><span>403.2</span></div>
          <div class="trow"><span data-t="suNoi"></span><span>123.0</span></div>
          <div class="trow"><span data-t="suOther"></span><span>38.0</span></div>
          <div class="trow tot"><span data-t="suSrcT"></span><span>1,680.8</span></div>
        </div>
        <div class="su-panel you">
          <div class="su-t" data-t="suYouH"></div>
          <div class="su-h" data-t="suUsesH"></div>
          <div class="trow"><span data-t="suAcq"></span><span>62.1</span></div>
          <div class="trow"><span data-t="suDev"></span><span id="su-dev">486.6</span></div>
          <div class="trow"><span data-t="suBet"></span><span id="su-bet">47.9</span></div>
          <div class="trow"><span data-t="suFin"></span><span id="su-fin">159.9</span></div>
          <div class="trow tot"><span data-t="suUsesT"></span><span id="su-uses-t">756.5</span></div>
          <div class="su-h" data-t="suSrcH"></div>
          <div class="trow"><span data-t="suResi"></span><span id="su-resi">1,116.6</span></div>
          <div class="trow"><span data-t="suHotel"></span><span id="su-hotel">403.2</span></div>
          <div class="trow"><span data-t="suNoi"></span><span id="su-noi">123.0</span></div>
          <div class="trow"><span data-t="suOther"></span><span>38.0</span></div>
          <div class="trow tot"><span data-t="suSrcT"></span><span id="su-src-t">1,680.8</span></div>
        </div>
      </div>
    </div>

    <div class="foot" data-t="foot"></div>
  </div>
</div>
<div style="background:var(--oxblood); margin:20px -22px 0; padding:12px 34px; display:flex; justify-content:space-between; align-items:center;">
  <span style="font-family:Georgia,serif; color:var(--azure); font-size:12.5px; letter-spacing:5px;">OMNAM</span>
  <span style="color:var(--azure); font-size:9.5px; letter-spacing:3px; opacity:.8;">CONFIDENTIAL</span>

      if (Math.abs(x) < 1) continue;
      out[i] += x * fracPc;
      const perM = x * v / C.nUnits;
      let rem = x * (1 - fracPc), j = i + 1;
      while (rem > 1 && j < N) { const amt = Math.min(perM, rem); out[j] += amt; rem -= amt; j++; }
      if (rem > 1) out[N - 1] += rem;
    }
    return out;
  }

  function buildProject(p) {
    const ar = (p.resiPrice / C.resiBasePrice) * (p.area / C.areaBase);
    const ah = (1 + noiPctFrom(p.adr, p.occ)) * ((p.margin || C.marginBase) / C.marginBase);
    const altv = p.ltv / C.ltvBase;
    const kResiCapex = p.kz + p.kp, kResiSales = p.kz + p.kp + p.kcr;
    const kHotOps = p.kch, kHotExit = p.kch + p.hold;

    const removed = add(D.resiPkgNB, D.resiBet, D.hotelVar);
    let P = D.pBase.map((x, i) => x - removed[i]);

    // resi (velocity redistributes the net-proceeds stream)
    const resiNetV = velStream(D.resiNet, p.vel || C.velBase);
    let salesScaled = add(D.resiSalesSide, scale(D.resiNet, -1), scale(resiNetV, ar));
    const dtax = -(ar - 1) * C.resiSalesTot * C.cgt;
    salesScaled = salesScaled.map((x, i) => x + dtax * D.taxW[i] / TAX_TOT);
    P = add(P, shift(D.resiCapexSide, kResiCapex), shift(salesScaled, kResiSales), shift(D.resiBet, p.kz));
    const mr = (p.rate || C.rateBase) / 12;
    if (p.kcr > 0) P[Math.min(C.iSweep + kResiSales, N - 1)] -= p.kcr * 223.33e6 * mr;
    if (p.kz + p.kp > 0) P[Math.min(C.iSweep + kResiSales, N - 1)] -= (p.kz + p.kp) * 48.36e6 * mr;

    // hotel
    let ops = add(scale(D.noiStream, ah), D.keyMoney, scale(D.refiDraw, altv * ah), scale(D.refiSvc, altv * ah));
    ops = shift(ops, kHotOps);
    if (p.hold !== 0) {
      const ext = new Array(N).fill(0), baseEnd = C.iex + kHotOps;
      if (p.hold > 0) {
        for (let t = 1; t <= p.hold; t++) {
          const j = Math.min(baseEnd + t, N - 1);
          ext[j] += C.stabNoiM * ah * Math.pow(1.025, t / 12) - 228.4e6 * altv * ah * (p.rate || C.rateBase) * 0.827 / 12;
        }
      } else {
        for (let t = 0; t < -p.hold; t++) {
          const j = Math.min(baseEnd - t, N - 1);
          ext[j] -= D.noiStream[C.iex - t] * ah - D.refiSvc[C.iex - t] * altv * ah;
        }
      }
      ops = add(ops, ext);
    }
    const saleNew = ah * C.noiExitBase * Math.pow(1.025, p.hold / 12) / p.cap * 0.99;
    const cgtNew = -Math.max(0, C.cgt * (saleNew - C.hotelBook));
    const iex2 = Math.min(Math.max(C.iex + kHotExit, 0), N - 1);
    P[iex2] += saleNew + cgtNew - 228.4e6 * altv * ah;
    P = add(P, ops, shift(D.shlRepH, kHotOps));
    if (p.kch > 0) P[Math.min(C.iRefi + kHotOps, N - 1)] -= p.kch * 258.0e6 * C.mrate;

    // capex overrun
    if (p.capexOver !== 0) {
      for (let i = 0; i < N; i++) P[i] += p.capexOver * C.capexKappa * D.capexBasis[i];
      const basisTot = D.capexBasis.reduce((a, b) => a + Math.abs(b), 0);
      const shield = p.capexOver * C.capexKappa * basisTot * 0.45 * C.cgt;
      for (let i = 0; i < N; i++) P[i] += shield * D.taxW[i] / TAX_TOT;
    }

    // financing cost: scale interest/commitment streams by rate ratio
    const rr = (p.rate || C.rateBase) / C.rateBase - 1;
    if (rr !== 0) for (let i = 0; i < N; i++) P[i] += rr * D.intStream[i];

    const mirror = add(D.shlMirrorFix, shift(D.shlRepR, kResiSales), shift(D.shlRepH, kHotOps));
    return [P, mirror];
  }

  function T(P, mirror) {
    const out = new Array(N).fill(0);
    let pri = C.priority;
    for (let i = 0; i < N; i++) {
      const pp = P[i];
      if (pp > 0) { const pr = Math.min(pp, pri); pri -= pr; out[i] += pr + C.marginDist * (pp - pr); }
      else if (pp < 0) out[i] += C.contribShare * pp;
      out[i] -= mirror[i];
    }
    return out;
  }

  function W(H, pref1, pref2, promote, lp1, lp2, gp) {
    const lp1cf = new Array(N).fill(0), lp2cf = new Array(N).fill(0), gpcf = new Array(N).fill(0);
    const b1 = { lp1: 0, lp2: 0, gp: 0 }, b2 = { lp1: 0, lp2: 0, gp: 0 };
    const tot = lp1 + lp2 + gp;
    const pp = { lp1: (1 - promote) * lp1 / tot, lp2: (1 - promote) * lp2 / tot, gp: (1 - promote) * gp / tot + promote };
    const caps = { lp1: lp1 / tot, lp2: lp2 / tot, gp: gp / tot };
    const cfOf = k => k === 'lp1' ? lp1cf : k === 'lp2' ? lp2cf : gpcf;
    for (let i = 0; i < N; i++) {
      for (const k in b1) b1[k] *= (1 + pref1 * YF[i]);
      for (const k in b2) b2[k] *= (1 + pref2 * YF[i]);
      const h = H[i];
      if (h < 0) {
        const need = -h;
        const sh = M[i] < D.lpEntry ? { gp: 1, lp1: 0, lp2: 0 } : { gp: 0, lp1: 2 / 3, lp2: 1 / 3 };
        for (const k in sh) { const a = need * sh[k]; b1[k] += a; b2[k] += a; cfOf(k)[i] -= a; }
      } else if (h > 0) {
        let rem = h; const d = {};
        d.lp1 = Math.min(b1.lp1, caps.lp1 * h); rem -= d.lp1;
        d.lp2 = Math.min(b1.lp2, Math.min(caps.lp2 * h, rem)); rem -= d.lp2;
        d.gp = Math.min(b1.gp, rem); rem -= d.gp;
        for (const k of ['lp1', 'lp2', 'gp']) { const e = Math.min(b1[k] - d[k], rem); d[k] += e; rem -= e; }
        for (const k of ['lp1', 'lp2', 'gp']) { b1[k] -= d[k]; b2[k] -= d[k]; cfOf(k)[i] += d[k]; }
        for (const k of ['lp2', 'gp', 'lp1']) {
          if (rem <= 0) break;
          const cu = Math.min(Math.max(b2[k], 0), rem); b2[k] -= cu; rem -= cu; cfOf(k)[i] += cu;
        }
        if (rem > 0) { lp1cf[i] += rem * pp.lp1; lp2cf[i] += rem * pp.lp2; gpcf[i] += rem * pp.gp; }
      }
    }
    return { lp: add(lp1cf, lp2cf), gp: gpcf };
  }

  const DEFAULTS = { resiPrice: C.resiBasePrice, area: C.areaBase, cap: C.capBase, adr: 4736,
    occ: 0.70, ltv: C.ltvBase, capexOver: 0, rate: C.rateBase, margin: C.marginBase, vel: C.velBase,
    kz: 0, kp: 0, kcr: 0, kch: 0, hold: 0,
    pref1: 0.10, pref2: 0.15, promote: 1 / 3, lp1: 0.5, lp2: 0.25, gp: 0.25 };
  const [PB, MB] = buildProject(DEFAULTS);
  const T_BASE = T(PB, MB);
  const WF_BASE = W(D.holdBase, 0.10, 0.15, 1 / 3, 0.5, 0.25, 0.25);

  function run(pIn) {
    const p = Object.assign({}, DEFAULTS, pIn);
    const [Pn, mir] = buildProject(p);
    const Tn = T(Pn, mir);
    const Hn = D.holdBase.map((x, i) => x + Tn[i] - T_BASE[i]);
    const kzs = (p.kz|0) + (p.kp|0);
    if (kzs > 0){ // deferred 5M D1 payment tracks the new-zoning date
      const j = Math.min(C.iZonPay + kzs, N - 1);
      Hn[C.iZonPay] += C.d1Defer; Hn[j] -= C.d1Defer;
    }
    const wfn = W(Hn, p.pref1, p.pref2, p.promote, p.lp1, p.lp2, p.gp);
    const res = {};
    for (const [party, baseCf] of [['lp', D.lpBase], ['gp', D.gpBase]]) {
      const cf = baseCf.map((x, i) => x + wfn[party][i] - WF_BASE[party][i]);
      if (party === 'lp' && kzs > 0){
        const j = Math.min(C.iZonPay + kzs, N - 1);
        cf[C.iZonPay] += C.d1Defer; cf[j] -= C.d1Defer;
      }
      const pe = peakEquity(cf), profit = sum(cf);
      res[party] = { cf, irr: xirr(cf), profit, pe, em: pe ? 1 + profit / pe : NaN };
    }
    // tax breakdown (project level, 100%)
    {
      const ar2 = (p.resiPrice / C.resiBasePrice) * (p.area / C.areaBase);
      const ah2 = (1 + noiPctFrom(p.adr, p.occ)) * ((p.margin || C.marginBase) / C.marginBase);
      const sale2 = ah2 * C.noiExitBase * Math.pow(1.025, p.hold / 12) / p.cap * 0.99;
      const basisTot2 = D.capexBasis.reduce((a, b) => a + Math.abs(b), 0);
      const shield2 = p.capexOver * C.capexKappa * basisTot2 * 0.45 * C.cgt;
      const tax = {
        betterment: C.bettermentTot,
        resi: Math.max(0, C.taxResiBase + C.cgt * (ar2 - 1) * C.resiSalesTot - shield2),
        hotel: Math.max(0, C.cgt * (sale2 - C.hotelBook)),
      };
      tax.total = tax.betterment + tax.resi + tax.hotel;
      res.tax = tax;
    }
    const pe = peakEquity(Hn), profit = sum(Hn);
    res.holdco = { cf: Hn, irr: xirr(Hn), profit, pe, em: pe ? 1 + profit / pe : NaN };
    return res;
  }
  return { run, xirr, N, months: M, noiPctFrom };
}

function monthName(baseSerial, plusMonths){
  const d = new Date(1899,11,30);
  d.setDate(d.getDate()+baseSerial);
  d.setMonth(d.getMonth()+plusMonths);
  return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}

function delta(el, cur, base, fmt, invert=false){
  const d = cur-base, e = S(el);
  if (Math.abs(d) <= Math.abs(base)*1e-8 + 1e-9){ e.textContent=t('eqBase'); e.className='d zero'; return; }
  e.textContent = (d>0?'+':'−') + fmt(Math.abs(d)) + t('vsBase');
  e.className = 'd ' + ((d>0) !== invert ? 'pos' : 'neg');
}
function annualize(cf){
  const byY = {};
  for (let i=0;i<cf.length;i++){
    const y = Math.floor((DATA.months[i]-2)/365.2425)+1900;
    byY[y] = (byY[y]||0)+cf[i];
  }
  const ys = Object.keys(byY).map(Number).sort();
  while (ys.length && Math.abs(byY[ys[ys.length-1]])<1e4) ys.pop();
  return ys.map(y=>({y, v:byY[y]}));
}
function drawBars(svgId, ann){
  const svg = S(svgId); const Wd=560, Hd=240, padL=8, padR=8, padT=14, padB=22;
  const vals = ann.map(a=>a.v/1e6);
  const mx = Math.max(...vals,0), mn = Math.min(...vals,0);
  const y = v => padT + (mx-v)/(mx-mn||1)*(Hd-padT-padB);
  const bw = (Wd-padL-padR)/ann.length;
  let s = `<line x1="${padL}" y1="${y(0)}" x2="${Wd-padR}" y2="${y(0)}" stroke="#cbd5e1"/>`;
  ann.forEach((a,i)=>{
    const v=a.v/1e6, x=padL+i*bw, h=Math.abs(y(v)-y(0));
    s+=`<rect x="${x+2}" y="${Math.min(y(v),y(0))}" width="${Math.max(bw-4,1)}" height="${Math.max(h,1)}" rx="2" fill="${v>=0?'#7f9db8':'#5e2c23'}" opacity="0.94"/>`;
    if (Math.abs(v)>1 && bw>26) s+=`<text x="${x+bw/2}" y="${v>=0?y(v)-4:y(v)+12}" font-size="9.5" text-anchor="middle" fill="#475569">${v.toLocaleString('en',{maximumFractionDigits:0})}</text>`;
    if (bw>18 || i%2===0) s+=`<text x="${x+bw/2}" y="${Hd-6}" font-size="9" text-anchor="middle" fill="#94a3b8">${String(a.y).slice(2)}'</text>`;
  });
  svg.innerHTML = s;
}
function drawCum(svgId, ann){
  const svg = S(svgId); const Wd=560, Hd=240, padL=14, padR=40, padT=26, padB=24;
  let c=0; const pts = ann.map(a=>{c+=a.v/1e6; return c;});
  const mx=Math.max(...pts,0), mn=Math.min(...pts,0);
  const y=v=>padT+(mx-v)/(mx-mn||1)*(Hd-padT-padB);
  const x=i=>padL+i/(ann.length-1||1)*(Wd-padL-padR);
  let path = pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(p).toFixed(1)).join(' ');
  let area = path + ` L${x(pts.length-1)},${y(0)} L${x(0)},${y(0)} Z`;
  let s = `<line x1="${padL}" y1="${y(0)}" x2="${Wd-padR+26}" y2="${y(0)}" stroke="#ded4cb"/>`;
  s += `<path d="${area}" fill="#7f9db81a"/><path d="${path}" fill="none" stroke="#5e2c23" stroke-width="2.5"/>`;
  ann.forEach((a,i)=>{ s+=`<text x="${x(i)}" y="${Hd-6}" font-size="9" text-anchor="middle" fill="#9a8f89">${String(a.y).slice(2)}'</text>`; });
  const fmtL = v => v.toLocaleString('en',{maximumFractionDigits:0});
  const li = pts.length-1;
  pts.forEach((p,i)=>{
    const changed = i===0 || Math.abs(p-pts[i-1]) > 0.5;
    if (!changed || i===li) return;
    const goingUp = i===0 ? (pts[1]||p) >= p : p >= pts[i-1];
    s += `<circle cx="${x(i)}" cy="${y(p)}" r="3.2" fill="#fff" stroke="#5e2c23" stroke-width="1.8"/>`;
    const ty = goingUp ? y(p)+16 : y(p)-9;
    const tyC = Math.max(padT-12, Math.min(Hd-padB-4, ty));
    const txC = Math.max(padL+12, Math.min(Wd-18, x(i)));
    s += `<text x="${txC}" y="${tyC}" font-size="10" font-weight="700" text-anchor="middle" fill="#2b2320" direction="ltr">${fmtL(p)}</text>`;
  });
  const last = pts[li];
  s += `<circle cx="${x(li)}" cy="${y(last)}" r="4" fill="#7f9db8" stroke="#5e2c23" stroke-width="1.5"/>`;
  s += `<text x="${Math.min(x(li)+4, Wd-2)}" y="${y(last)-10}" font-size="11.5" font-weight="700" text-anchor="end" fill="#5e2c23" direction="ltr">${fmtL(last)}</text>`;
  svg.innerHTML = s;
}

function drawTL(){

  const today = 2026*12+6;
  const pts = [
    {mi: today,                        lab: t('tlToday'),  now:true},
    {mi: serialIdx(48121)-40+kz+kcr,   lab: t('tlSales')},
    {mi: serialIdx(47573)+kch,         lab: t('tlHotel')},
    {mi: serialIdx(48121)+kz+kcr,      lab: t('tlResi')},
    {mi: serialIdx(49948)+hold+kch,    lab: t('tlExit')},
  ].sort((a,b)=>a.mi-b.mi);
  const Wd=1120, padL=46, padR=52, yL=56;
  const m0=pts[0].mi-3, m1=pts[pts.length-1].mi+3;
  const x = mi => padL + (mi-m0)/(m1-m0)*(Wd-padL-padR);
  let s = `<line x1="${padL-14}" y1="${yL}" x2="${Wd-padR+14}" y2="${yL}" stroke="#e6ddd6" stroke-width="2"/>`;
  pts.forEach((pt,i)=>{
    const px=x(pt.mi), up = i%2===0;

      s += `<path d="M${px},${yL-7} L${px+6},${yL} L${px},${yL+7} L${px-6},${yL} Z" fill="#7f9db8"/>`;
    } else {
      s += `<circle cx="${px}" cy="${yL}" r="5.5" fill="#5e2c23" stroke="#fff" stroke-width="1.5"/>`;
    }
    const ty1 = up ? yL-26 : yL+26, ty2 = up ? yL-13 : yL+39;
    s += `<text x="${px}" y="${ty1}" font-size="11.5" font-weight="700" text-anchor="middle" fill="${pt.now?'#7f9db8':'#5e2c23'}">${pt.lab}</text>`;
    s += `<text x="${px}" y="${ty2}" font-size="10.5" text-anchor="middle" fill="#7a6f6a" direction="ltr">${idxLabel(pt.mi)}</text>`;
  });
  S('ch-tl').innerHTML = s;
}
function paybackYear(cf){
  let cum = 0, peaked = false;
  for (let i=0;i<cf.length;i++){
    cum += cf[i];
    if (cum < -1e5) peaked = true;
    if (peaked && cum >= 0) return Math.floor((DATA.months[i]-2)/365.2425)+1900;
  }
  return null;
}

  return `<div class="scen ${extraCls||''}">
    <div class="head" style="background:${color}">${title}<small>${sub}</small></div>

}
function buildScenarios(p, rCur){
  const defs = [
    [t('scYou'), t('scYouSub'), null, '#7f9db8', 'you'],
    [t('scUp'), t('scUpSub'), SCEN.up, '#4f7396', ''],
    [t('scBase'), t('scBaseSub'), SCEN.base, '#5e2c23', ''],
    [t('scDw1'), t('scDw1Sub'), SCEN.dw1, '#8a5a50', ''],
    [t('scDw2'), t('scDw2Sub'), SCEN.dw2, '#3f1d17', ''],
  ];
  let html = '';
  for (const [title, sub, s, color, cls] of defs){
    let r;
    if (s === null) r = rCur;
    else {
      const q = {};
      const full = Object.assign({}, DEFS, s);
      q.resiPrice = full.price/FX; q.cap = full.cap; q.adr = full.adr; q.occ = full.occ;
      q.capexOver = full.capex; q.kz = full.kz; q.kp = 0; q.kcr = full.kcr; q.kch = full.kch;
      q.ltv = full.ltv; q.area = full.area; q.hold = full.hold; q.rate = full.rate; q.margin = full.margin/100; q.vel = full.vel;
      r = eng.run(q);
    }
    html += scenCard(title, sub, r, color, cls);
  }
  S('scen-grid').innerHTML = html;
}
const SU_BASE = {dev:486.6, bet:47.9, fin:159.9, resi:1116.6, hotel:403.2, noi:123.0, acq:62.1, key:38.0, int:129.6, kappaBasis:0.626*401.4};

function updateSU(p, r, saleNew, resiTot, noiPct){
  const aH = (1+noiPct)*(p.margin/DATA.const.marginBase);
  const dev = SU_BASE.dev + p.capexOver*SU_BASE.kappaBasis;
  const bet = r.tax.betterment/1e6;
  const fin = SU_BASE.fin + (p.rate/DATA.const.rateBase - 1)*SU_BASE.int
            + ((p.kcr*223.33 + p.kz*48.36 + p.kch*258.0) * p.rate/12);
  let noi = SU_BASE.noi*aH;
  if (p.hold > 0){ for (let m=1;m<=p.hold;m++) noi += (DATA.const.stabNoiM/1e6)*aH*Math.pow(1.025, m/12); }
  else if (p.hold < 0){ noi -= (DATA.const.stabNoiM/1e6)*aH*(-p.hold); }
  suCell('su-dev', SU_BASE.dev, dev);
  suCell('su-bet', SU_BASE.bet, bet);
  suCell('su-fin', SU_BASE.fin, fin);
  suCell('su-uses-t', SU_BASE.acq+SU_BASE.dev+SU_BASE.bet+SU_BASE.fin, SU_BASE.acq+dev+bet+fin);
  suCell('su-resi', SU_BASE.resi, resiTot/1e6);
  suCell('su-hotel', SU_BASE.hotel, saleNew/1e6);
  suCell('su-noi', SU_BASE.noi, noi);
  suCell('su-src-t', SU_BASE.resi+SU_BASE.hotel+SU_BASE.noi+SU_BASE.key, resiTot/1e6+saleNew/1e6+noi+SU_BASE.key);
}

  S('o-profit').textContent = fmtM(r.lp.profit);
  S('o-pe').textContent = fmtM(r.lp.pe);
  delta('d-irr', r.lp.irr, baseRes.lp.irr, x=>(x*100).toFixed(1)+t('pp'));
  delta('d-em', r.lp.em, baseRes.lp.em, x=>fmtX(x));
  delta('d-profit', r.lp.profit, baseRes.lp.profit, x=>mIls(x));
  delta('d-pe', r.lp.pe, baseRes.lp.pe, x=>mIls(x), true);
  S('o-payback').textContent = (function(){ let c=0,pk=false;
    for (let i=0;i<r.lp.cf.length;i++){ c+=r.lp.cf[i]; if(c<-1e5)pk=true;
      if(pk&&c>=0) return Math.floor((DATA.months[i]-2)/365.2425)+1900; } return '—'; })();
  S('o-dist').textContent = mIls(r.lp.cf.reduce((a,b)=>a+(b>0?b:0),0));
  const noiPct = eng.noiPctFrom(p.adr, p.occ);
  const saleNew = (1+noiPct)*DATA.const.noiExitBase*Math.pow(1.025, p.hold/12)/p.cap*0.99;
  const resiTot = DATA.const.resiSalesTot*(p.resiPrice/DATA.const.resiBasePrice)*(p.area/DATA.const.areaBase);
  S('o-exit').textContent = fmtM(saleNew)+' | '+mIls(resiTot);
  updateSU(p, r, saleNew, resiTot, noiPct);

  const tM = x => (x/1e6).toLocaleString(LOC(),{minimumFractionDigits:1, maximumFractionDigits:1});
  S('tx-bet').textContent = tM(r.tax.betterment);
  S('tx-resi').textContent = tM(r.tax.resi);
  S('tx-hotel').textContent = tM(r.tax.hotel);
  S('tx-tot').textContent = tM(r.tax.total);
  const dTax = r.tax.total - 246263000;
  S('tx-note').textContent = Math.abs(dTax) < 5e5 ? t('taxSame') :
    (dTax>0? '+' : '−') + tM(Math.abs(dTax)) + t('taxDelta');

  const ann = annualize(r.lp.cf);
  drawBars('ch-cf', ann);
  drawCum('ch-cum', ann);
  drawTL();
  markChanged();
  clearTimeout(sensTimer);
  sensTimer = setTimeout(()=>buildScenarios(p, r), 120);
}
const SCEN = {
  base:{},
  up:  {price:216000, cap:0.06, adr:5100, occ:0.75, ltv:0.75},
  dw1: {price:156000, cap:0.0725, adr:4200, occ:0.62, capex:0.05, kz:3, kcr:3},
  dw2: {price:135000, cap:0.09, adr:3800, occ:0.55, capex:0.10, kz:6, kcr:6, kch:6},
};
function applyScen(s){
  for (const k of inputs) S('i-'+k).value = (k in s) ? s[k] : DEFS[k];
  recalc();
}
document.querySelectorAll('#chips .chip').forEach(ch=>{
  ch.addEventListener('click', ()=>{
    document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('active'));
    ch.classList.add('active');
    applyScen(SCEN[ch.dataset.s]);
  });
});
S('reset').addEventListener('click', ()=>{
  document.querySelectorAll('#chips .chip').forEach(c=>c.classList.toggle('active', c.dataset.s==='base'));
  applyScen({});
});
inputs.forEach(k=>S('i-'+k).addEventListener('input', ()=>{
  document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('active'));
  recalc();
}));
function setLang(l){
  LANG = l;
  applyLang();
  recalc();
}
S('lang-he').addEventListener('click', ()=>setLang('he'));
S('lang-en').addEventListener('click', ()=>setLang('en'));
applyLang();
recalc();
</script>
</body>
